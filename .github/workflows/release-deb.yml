name: Release Debian Package

on:
  release:
    types:
      - published

jobs:
  build-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncursesw5-dev libsqlite3-dev libjson-c-dev zlib1g-dev

      - name: Build binary
        run: make

      - name: Build Debian package
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -eux

          VERSION="${TAG_NAME#v}"
          PKG_ROOT="$RUNNER_TEMP/ttb2-pkg"
          STAGE_ROOT="$PKG_ROOT/stage"
          DEBIAN_DIR="$STAGE_ROOT/DEBIAN"
          ARCH="$(dpkg --print-architecture)"
          PKG_NAME="ttb2_${VERSION}_${ARCH}.deb"

          rm -rf "$PKG_ROOT"
          mkdir -p "$DEBIAN_DIR"

          make install PREFIX=/usr DESTDIR="$STAGE_ROOT"

          cat > "$DEBIAN_DIR/control" <<EOF
Package: ttb2
Version: ${VERSION}
Section: utils
Priority: optional
Architecture: ${ARCH}
Maintainer: Luke Canada <canadaluke888@gmail.com>
Depends: libc6, libncursesw6, libpanelw6, libsqlite3-0, libjson-c5, zlib1g
Description: Terminal Table Builder 2.0
 ncurses-based table editor with CSV, XLSX, TTBL, and TTBX support.
          EOF

          dpkg-deb --build "$STAGE_ROOT" "$PKG_ROOT/$PKG_NAME"
          cp "$PKG_ROOT/$PKG_NAME" .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ttb2_*.deb
